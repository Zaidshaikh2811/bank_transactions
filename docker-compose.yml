version: "3.9"

services:
  app:
    build: .
    container_name: banking-api

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      PORT: 3000

      MONGO_URI: mongodb://mongo:27017/banking

      REDIS_HOST: redis
      REDIS_PORT: 6379

      ACCESS_TOKEN_SECRET: your-secret
      REFRESH_TOKEN_SECRET: your-refresh-secret

    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:8
    container_name: banking-mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:8-alpine
    container_name: banking-redis

    ports:
      - "6379:6379"

volumes:
  mongo_data: